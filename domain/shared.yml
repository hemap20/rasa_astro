version: "3.1"

slots:
  # ── Collect input ──────────────────────────────────────────────────────────
  user_analysis_reply:
    type: text
    mappings:
      - type: from_llm
  diagnostic_choice:
    type: text
    mappings:
      - type: from_llm

  # ── Flow control ───────────────────────────────────────────────────────────
  analysis_complete:
    type: bool
    mappings:
      - type: controlled
  loop_count:
    type: float
    initial_value: 0
    mappings:
      - type: controlled
  depth_phase:
    type: text
    mappings:
      - type: controlled
  birth_time_known:
    type: bool
    initial_value: false
    mappings:
      - type: controlled
  monitoring_mode:
    type: bool
    initial_value: false
    mappings:
      - type: controlled
  user_has_new_question:
    type: bool
    initial_value: false
    mappings:
      - type: from_llm

  # ── Intent routing ────────────────────────────────────────────────────────
  next_action_intent:
    type: text
    mappings:
      - type: custom
  depth_change_signal:
    type: text
    mappings:
      - type: custom

  # # ── Birth data ────────────────────────────────────────────────────────────
  # birth_date:
  #   type: text
  #   mappings:
  #     - type: controlled
  # birth_time:
  #   type: text
  #   mappings:
  #     - type: controlled
  # birth_place:
  #   type: text
  #   mappings:
  #     - type: controlled
  # birth_info_attempts:
  #   type: float
  #   initial_value: 0
  #   mappings:
  #     - type: controlled

  # ── Astrological context ───────────────────────────────────────────────────
  current_pain_point:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_high_status_intro:
    - text: "Radhe Radhe ji "

  utter_ask_user_analysis_reply:
    - text: ""
  utter_ask_diagnostic_choice:
    - text: ""

intents:
  - greeting
  - affirm
  - deny
  - inform_pain_point
  - ask_remedy_check
  - express_distress
  - user_acknowledgement
  - ask_question
  - provide_birth_info
  - express_urgency
  - express_doubt
  - express_gratitude
  - new_topic
  - emotional_response
  - out_of_scope

actions:
  # ── Entry ──────────────────────────────────────────────────────────────────
  - action_gemini_autonomous_analysis

  # ── Loop control ───────────────────────────────────────────────────────────
  - action_increment_loop_count
  - action_route_by_depth

  # ── Phase A: Discovery (iterations 1–2) ───────────────────────────────────
  - action_micro_validation
  - action_generate_astro_insight
  - action_barnum_diagnostic
  - action_check_birth_data
  - action_request_photo_pivot
  - action_balanced_prediction
  - action_generate_diagnostic_question
  - action_benchmark_timeline
  - action_personalized_prediction
  - action_active_assurance
  - action_provide_ritual_remedy
  - action_retention_hook
  # - action_diagnostic_choice

  # ── Phase B: Deepening (iterations 3–4) ───────────────────────────────────
  - action_pattern_reinforcement
  - action_shadow_revelation
  - action_connect_past_patterns

  # ── Phase C: Narrative / Monitoring (iteration 5+) ────────────────────────
  - action_enter_monitoring_mode
  - action_benchmark_handover
  - action_guardian_persona

  # ── Dynamic intent routing ─────────────────────────────────────────────────
  - action_classify_user_intent
  - action_acknowledge_topic_switch
  - action_clarify_last_response
  - action_handle_crisis
  - action_handle_depth_request
