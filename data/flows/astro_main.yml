flows:
  astro_consultation_flow:
    description: "High-engagement astrological consultation journey with layered narrative arc"
    steps:
      - action: utter_high_status_intro

      # --- PHASE 1: AUTONOMOUS ANALYSIS (Entry) ---
      - id: astro_analysis_loop
        action: action_gemini_autonomous_analysis
        next:
          - if: slots.analysis_complete == true
            then: increment_loop_counter
          - else: wait_for_user_reply

      # --- CORE INPUT ---
      - id: wait_for_user_reply
        collect: user_analysis_reply
        description: "Collects the user's response."
        next: increment_loop_counter

      - id: increment_loop_counter
        action: action_increment_loop_count
        next: route_by_depth

      - id: route_by_depth
        action: action_route_by_depth 
        next:
          - if: slots.depth_phase == "discovery"     
            then: discovery_phase
          - if: slots.depth_phase == "deepening"    
            then: deepening_phase
          - if: slots.depth_phase == "narrative"  
            then: narrative_phase
          - else: discovery_phase

      # ====================================================
      # PHASE A: DISCOVERY (Iterations 1–2)
      # Immediate burning question → Prediction → Remedy
      # ====================================================
      - id: discovery_phase
        action: action_micro_validation        
        next: provide_astro_insight

      - id: provide_astro_insight
        action: action_generate_astro_insight  
        next: confirm_pattern

      - id: confirm_pattern
        action: action_barnum_diagnostic       
        next: first_prediction

      # - id: check_birth_data
      #   action: action_check_birth_data        
      #   next:
      #     - if: slots.birth_time_known == false
      #       then: photo_pivot
      #     - else: first_prediction

      # - id: photo_pivot
      #   action: action_request_photo_pivot     
      #   next: first_prediction

      - id: first_prediction
        action: action_balanced_prediction     
        next: provide_timeline

      - id: provide_timeline
        action: action_benchmark_timeline      
        next: diagnostic_follow_up

      - id: diagnostic_follow_up
        action: action_ask_diagnostic_choice
        next: collect_diagnostic_choice

      - id: collect_diagnostic_choice
        collect: diagnostic_choice
        next: specific_prediction

      - id: specific_prediction
        action: action_personalized_prediction   
        next: deliver_remedy

      - id: deliver_remedy
        action: action_provide_ritual_remedy      
        next: secret_revelation



      # ====================================================
      # PHASE B: DEEPENING (Iterations 3–4)
      # Shift from WHAT to WHY and HOW
      # ====================================================
      - id: deepening_phase
        action: action_pattern_reinforcement
        next: shadow_revelation

      - id: shadow_revelation
        action: action_shadow_revelation
        next: past_pattern_connection

      - id: past_pattern_connection
        action: action_connect_past_patterns
        next: establish_authority
      
      - id: establish_authority
        action: action_active_assurance
        next: deepening_remedy

      - id: deepening_remedy
        action: action_provide_ritual_remedy      
        next: wait_for_user_reply                 


      # ====================================================
      # PHASE C: NARRATIVE / MONITORING MODE (Iteration 5+)
      # Stop predicting. Build the Return Hook.
      # ====================================================
      - id: narrative_phase
        action: action_enter_monitoring_mode
        next: benchmark_handover

      - id: benchmark_handover
        action: action_benchmark_handover
        next: guardian_persona

      - id: secret_revelation
        action: action_retention_hook             
        next: wait_for_user_reply                 
      
      - id: guardian_persona
        action: action_guardian_persona
        next: farewell_hook

      - id: farewell_hook
        action: action_active_assurance
        next:
          - if: slots.user_has_new_question == true
            then: wait_for_user_reply             
          - else: farewell_hook                   