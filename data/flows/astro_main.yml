flows:
  astro_consultation:
    description: "Start this flow whenever the user asks a question"
    steps:
      - action: utter_high_status_intro
      - id: astro_analysis_loop
        action: action_gemini_autonomous_analysis
        next:
          - if: slots.analysis_complete == true
            then:
              - link: standard_flow 
          - else: wait_for_user_reply

      - id: wait_for_user_reply
        collect: user_analysis_reply
        description: "Collects the user's open-ended response."
        next: astro_analysis_loop

  standard_flow:
    description: "Internal sub-flow for delivering relatable astrological insights. Do not start this flow directly; it is only triggered internally after the initial consultation."
    steps:
      - action: action_process_astro_insight
      - collect: user_analysis_reply 
      - link: doctor_flow 


  doctor_flow:
    description: "Internal sub-flow for diagnosing astrological root causes and collecting symptoms. Start this flow after empathatic flow."
    steps:
      - action: utter_empathy_validation
      - action: utter_calming_reassurance
      - action: action_gemini_barnum_flip
      - collect: user_confirmation
      - action: action_collect_symptoms
      - collect: user_analysis_reply
      - action: action_explain_root_cause
      - collect: user_analysis_reply
      - link: remedy_cycle 

  remedy_cycle:
    description: "Internal sub-flow for prescribing an astrological remedy and confirming the user's commitment. Start this flow after doctor flow."
    steps:
      - action: action_prescribe_remedy
      - collect: user_confirmation
      - action: utter_summary
      - link: mystery_flow 

  mystery_flow:
    description: "Internal sub-flow for delivering a bold astrological prediction and creating a retention hook. Start this flow after remedy cycle."
    steps:
      - action: utter_pattern_breaker
      - action: action_gemini_bold_prediction
      - collect: acknowledged_warning
      - action: utter_retention_hook_unfinished
