flows:
  astro_consultation_flow:
    description: "7-phase astrological consultation: emotion-first, engagement-driven, multi-session"
    steps:

      # ── Session check ──────────────────────────────────────────────────────
      - action: action_check_return_session
        next:
          - if: slots.is_return_session == true
            then: return_open
          - else: fresh_open

      # ── Phase 7: Return session opening ───────────────────────────────────
      - id: return_open
        action: action_return_session_opening
        next: main_loop

      # ── Phase 1: Opening ──────────────────────────────────────────────────
      - id: fresh_open
        action: action_opening_greeting
        next: collect_opening

      - id: collect_opening
        collect: user_analysis_reply
        description: "Wait for user's initial message about their concern"
        next: analyze_route

      - id: analyze_route
        action: action_analyze_and_route
        next:
          - if: slots.topic == "general"
            then: resonant_hook
          - else: acknowledge_topic

      # ── Phase 1b: Open-ended handler ──────────────────────────────────────
      - id: resonant_hook
        action: action_deliver_resonant_hook
        next: offer_topic

      - id: offer_topic
        action: action_offer_topic_choice
        next: collect_topic

      - id: collect_topic
        collect: user_analysis_reply
        description: "User picks love / career / family / etc."
        next: analyze_topic_choice

      - id: analyze_topic_choice
        action: action_analyze_and_route
        next: acknowledge_topic

      # ── Phase 2: Data collection ──────────────────────────────────────────
      - id: acknowledge_topic
        action: action_acknowledge_and_clarify
        next: data_loop

      - id: data_loop
        collect: user_analysis_reply
        description: "Collect person name, contact status, and other details"
        next: data_step

      - id: data_step
        action: action_data_collection_step
        next:
          - if: slots.data_collection_complete == true
            then: ritual_pause
          - else: data_loop

      # ── Phase 3: First reading ─────────────────────────────────────────────
      - id: ritual_pause
        action: action_deliver_ritual_pause
        next: validation

      - id: validation
        action: action_deliver_validation
        next: cosmic_scapegoat

      - id: cosmic_scapegoat
        action: action_deliver_cosmic_scapegoat
        next: first_drip

      - id: first_drip
        action: action_deliver_first_drip
        next: main_loop

      # ── Phase 4+: Main deepening loop ─────────────────────────────────────
      - id: main_loop
        collect: user_analysis_reply
        description: "Main conversation loop — collects every user message"
        next: tick

      - id: tick
        action: action_increment_turn_count
        next: monitor

      - id: monitor
        action: action_monitor_engagement
        next:
          - if: slots.session_closing == true
            then: session_close
          - if: slots.trigger_reengagement == true
            then: recovery
          - if: slots.needs_credibility_recovery == true
            then: credibility
          - if: slots.topic_changed == true
            then: pivot
          - if: slots.remedy_requested == true
            then: remedy_check
          - else: deepen

      - id: deepen
        action: action_deepen_reading
        next: main_loop

      - id: recovery
        action: action_select_recovery_tactic
        next: main_loop

      - id: credibility
        action: action_credibility_recovery
        next: main_loop

      - id: pivot
        action: action_handle_topic_change
        next: main_loop

      # ── Phase 5: Remedy ────────────────────────────────────────────────────
      - id: remedy_check
        action: action_check_remedy_eligibility
        next:
          - if: slots.remedy_eligible == true
            then: give_remedy
          - else: deepen

      - id: give_remedy
        action: action_deliver_remedy
        next: main_loop

      # ── Phase 6: Session close ─────────────────────────────────────────────
      - id: session_close
        action: action_plant_hook_and_close
        next: END
