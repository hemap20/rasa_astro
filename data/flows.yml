flows:
  astrology_consultation:
    description: Main flow for Omkar's consultation
    steps:
      - action: action_handle_topic_change # Manages the 4th-topic Barnum Flip
      - action: action_determine_session_style # Shuffles between Standard, Doctor, and Mystery
      - action: action_inject_current_sky # Fetches Gochar data
      - action: action_omkar_entry_hook # Handles 40/30/20/10 entry and 21-day check-ins
      - collect: user_confirmation
        next:
          - if: slots.session_style == "Standard"
            next: nidaan_phase
          - if: slots.session_style == "Doctor"
            next: doctor_flow
          - else: mystery_flow

  nidaan_phase: # Session A: Hook -> Relate -> Reveal -> Remedy
    steps:
      - action: action_provide_diagnosis # Relieved Certainty: The "Why"
      - collect: ready_for_remedy
      - action: action_provide_upay # The Prescription: The "How"
      - action: action_sudden_realization # Pattern Breaker
      - action: action_retention_hook # Future dependency

  doctor_flow: # Session B: Relate -> Direct Question -> Deep Analysis
    steps:
      - action: action_direct_question
      - action: action_provide_diagnosis
      - action: action_provide_upay

  mystery_flow: # Session C: Sudden Realization -> Warning -> Relate -> Remedy
    steps:
      - action: action_sudden_realization
      - action: action_provide_diagnosis
      - action: action_provide_upay